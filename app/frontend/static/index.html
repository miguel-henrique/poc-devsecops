<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoC DevSecOps</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #0f172a;
        background: #f8fafc;
      }
      body {
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      code {
        background: #e2e8f0;
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
      }
      .ok {
        color: #15803d;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>PoC nuvem local</h1>
    <p>
      Esta interface é servida pelo <strong>nginx</strong> (camada de borda / analogia
      a ALB + conteúdo estático). A página chama a API pelo caminho
      <code>/api/</code>, que o nginx encaminha para <strong>uma das réplicas</strong>
      do backend (analogia a pods no EKS ou tarefas no ECS).
    </p>
    <p id="status">Carregando status da API…</p>
    <pre id="payload"></pre>
    <script>
      async function load() {
        const statusEl = document.getElementById("status");
        const payloadEl = document.getElementById("payload");
        try {
          const res = await fetch("/api/status");
          const body = await res.json();
          statusEl.textContent = res.ok
            ? "API acessível (verificação do banco abaixo)."
            : "A API retornou erro.";
          statusEl.className = res.ok ? "ok" : "err";
          payloadEl.textContent = JSON.stringify(body, null, 2);
        } catch (e) {
          statusEl.textContent = "Não foi possível acessar /api/status";
          statusEl.className = "err";
          payloadEl.textContent = String(e);
        }
      }
      load();
    </script>
  </body>
</html>
